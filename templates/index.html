<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
    :root {
        --stone: #242423;
        --slate: #333533;
        --moss: #4b5320;
        --linen: #e8e8e4;
        --gold-leaf: #cfb53b;
    }

    body {
        background-color: var(--stone);
        color: var(--linen);
        font-family: 'Inter', sans-serif;
        margin: 0;
        overflow-x: hidden;
    }

    /* Base Mobile Layout (Stacked) */
    .split-layout {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }

    /* Header/Sidebar logic */
    .sidebar-visual {
        width: 100%;
        min-height: 40vh;
        background: linear-gradient(to bottom, rgba(36, 36, 35, 0.9), rgba(75, 83, 32, 0.6)), 
                    url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&q=80&w=2560');
        background-size: cover;
        background-position: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 40px 20px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        z-index: 10;
    }

    .sidebar-visual h1 {
        font-family: 'Cormorant Garamond', serif;
        font-size: clamp(2.5rem, 8vw, 4rem); /* Fluid typography */
        line-height: 0.9;
        margin-bottom: 20px;
        color: var(--linen);
    }

    /* Form Content logic */
    .form-content {
        width: 100%;
        padding: 60px 20px;
        background: var(--stone);
    }

    /* Desktop Enhancements (992px and up) */
    @media (min-width: 992px) {
        .split-layout {
            flex-direction: row;
        }

        .sidebar-visual {
            width: 40%;
            position: fixed;
            height: 100vh;
            padding: 60px;
            border-right: 1px solid rgba(255,255,255,0.1);
            border-bottom: none;
            justify-content: flex-end;
        }

        .form-content {
            margin-left: 40%;
            width: 60%;
            padding: 100px 80px;
        }
    }

    /* Category Blocks & Inputs */
    .category-block {
        margin-bottom: 60px;
        opacity: 0;
        transform: translateY(20px);
        animation: fadeIn 0.8s forwards;
    }

    @keyframes fadeIn {
        to { opacity: 1; transform: translateY(0); }
    }

    .category-title {
        font-family: 'Cormorant Garamond', serif;
        font-size: 1.5rem;
        font-style: italic;
        border-bottom: 1px solid var(--gold-leaf);
        padding-bottom: 10px;
        margin-bottom: 30px;
        color: var(--gold-leaf);
    }

    .form-label {
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: #999;
        margin-bottom: 8px;
    }

    .form-control, .form-select {
        background: rgba(255,255,255,0.03) !important;
        border: 1px solid #444;
        border-radius: 0;
        color: var(--linen) !important;
        padding: 12px;
        font-size: 0.95rem;
        transition: all 0.3s;
    }

    .btn-submit {
        background: var(--gold-leaf);
        color: var(--stone);
        border: none;
        border-radius: 0;
        padding: 18px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 3px;
        transition: all 0.4s;
        width: 100%;
        margin-top: 20px;
    }

    .btn-submit:hover {
        background: var(--linen);
        letter-spacing: 5px;
    }
</style>
</head>
<body>

    <div class="split-layout">
        <div class="sidebar-visual">
            <p style="letter-spacing: 5px; font-size: 0.7rem; color: var(--gold-leaf);">PREDICTION ENGINE</p>
            <h1>The<br>Natural<br>Order.</h1>
            <p class="mt-3" style="font-weight: 300; color: #ccc; max-width: 300px;">
                Analyzing the fundamental pillars of human longevity across 19 global data points.
            </p>
        </div>

        <div class="form-content">
            <form action="/predict" method="POST">
                
                <div class="category-block" style="animation-delay: 0.2s;">
                    <h2 class="category-title">01. Biological Vitals</h2>
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label">Adult Mortality Rate</label>
                            <input type="number" step="any" name="adult_mortality" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Body Mass Index (BMI)</label>
                            <input type="number" step="any" name="bmi" class="form-control" required>
                        </div>
                        <div class="col-md-4"><label class="form-label">Infant Deaths</label><input type="number" step="any" name="infant_deaths" class="form-control" required></div>
                        <div class="col-md-4"><label class="form-label">Under-5 Deaths</label><input type="number" step="any" name="under_five_deaths" class="form-control" required></div>
                        <div class="col-md-4"><label class="form-label">HIV/AIDS Prev.</label><input type="number" step="any" name="hiv_aids" class="form-control" required></div>
                    </div>
                </div>

                <div class="category-block" style="animation-delay: 0.4s;">
                    <h2 class="category-title">02. Viral Resilience</h2>
                    <div class="row g-4">
                        <div class="col-md-4"><label class="form-label">Hepatitis B %</label><input type="number" step="any" name="hepatitis_b" class="form-control" required></div>
                        <div class="col-md-4"><label class="form-label">Polio %</label><input type="number" step="any" name="polio" class="form-control" required></div>
                        <div class="col-md-4"><label class="form-label">Diphtheria %</label><input type="number" step="any" name="diphtheria" class="form-control" required></div>
                        <div class="col-md-12"><label class="form-label">Measles (Total Cases)</label><input type="number" step="any" name="measles" class="form-control" required></div>
                    </div>
                </div>

                <div class="category-block" style="animation-delay: 0.6s;">
                    <h2 class="category-title">03. Earth Resources</h2>
                    <div class="row g-4">
                        <div class="col-md-6"><label class="form-label">GDP (Per Capita)</label><input type="number" step="any" name="gdp" class="form-control" required></div>
                        <div class="col-md-6"><label class="form-label">Education (Years)</label><input type="number" step="any" name="schooling" class="form-control" required></div>
                        <div class="col-md-8"><label class="form-label">Income Composition</label><input type="number" step="0.001" name="income_composition" class="form-control" required></div>
                        <div class="col-md-4">
                            <label class="form-label">Status</label>
                            <select name="status_developing" class="form-select">
                                <option value="True">Developing</option>
                                <option value="False">Developed</option>
                            </select>
                        </div>
                        <div class="col-md-4"><label class="form-label">Population</label><input type="number" step="any" name="population" class="form-control" required></div>
                        <div class="col-md-4"><label class="form-label">Thinness 1-19</label><input type="number" step="any" name="thinness_1_19" class="form-control" required></div>
                        <div class="col-md-4"><label class="form-label">Thinness 5-9</label><input type="number" step="any" name="thinness_5_9" class="form-control" required></div>
                    </div>
                </div>

                <div class="category-block" style="animation-delay: 0.8s;">
                    <h2 class="category-title">04. Human Pattern</h2>
                    <div class="row g-4">
                        <div class="col-md-4"><label class="form-label">Alcohol Intake</label><input type="number" step="any" name="alcohol" class="form-control" required></div>
                        <div class="col-md-4"><label class="form-label">% Life Expenditure</label><input type="number" step="any" name="percentage_expenditure" class="form-control" required></div>
                        <div class="col-md-4"><label class="form-label">Total Expenditure</label><input type="number" step="any" name="total_expenditure" class="form-control" required></div>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Predict</button>
            </form>
        </div>
    </div>

</body>

</html>
